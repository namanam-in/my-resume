<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Naman Singla</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .thankyou-page {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px 20px;
  }

  .thankyou-card {
    width: min(100%, 760px);
    padding: 44px;
    border-radius: 32px;
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.55);
    box-shadow: var(--shadow);
    text-align: center;
    backdrop-filter: blur(18px);
  }

  .thankyou-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.56);
    border: 1px solid rgba(31, 36, 48, 0.08);
    color: var(--accent-dark);
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .thankyou-badge::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .thankyou-card h1 {
    font-family: "DM Serif Display", serif;
    font-size: clamp(2.4rem, 5vw, 4.4rem);
    font-weight: 400;
    line-height: 1.05;
    margin-bottom: 16px;
  }

  .thankyou-card p {
    color: var(--muted);
    font-size: 1.05rem;
  }

  .thankyou-copy {
    display: grid;
    gap: 10px;
    margin-bottom: 28px;
  }

  .thankyou-actions {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .thankyou-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 52px;
    padding: 0 22px;
    border-radius: 999px;
    font-weight: 800;
    transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
  }

  .thankyou-btn:hover,
  .thankyou-btn:focus-visible {
    transform: translateY(-2px);
  }

  .thankyou-btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .thankyou-btn-primary:hover,
  .thankyou-btn-primary:focus-visible {
    background: var(--accent-dark);
  }

  .thankyou-btn-secondary {
    background: rgba(255, 255, 255, 0.58);
    border: 1px solid var(--line);
  }

  @media (max-width: 640px) {
    .thankyou-card {
      padding: 32px 24px;
    }
  }
</style>
</head>
<body>
  <main class="thankyou-page">
    <section class="thankyou-card">
      <p class="thankyou-badge">Message Sent</p>
      <h1>Thank you for reaching out.</h1>
      <div class="thankyou-copy">
        <p>Your message has been submitted successfully.</p>
        <p>I will get back to you soon.</p>
      </div>
      <div class="thankyou-actions">
        <a class="thankyou-btn thankyou-btn-primary" href="index.html">Back to Resume</a>
        <a class="thankyou-btn thankyou-btn-secondary" href="#top" onclick="window.history.back(); return false;">Go Back</a>
      </div>
    </section>
  </main>
</body>
</html>
